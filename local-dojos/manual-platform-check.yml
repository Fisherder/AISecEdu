  - type: text
    path: manual/persistent-home/check-server.py
    content: |
      #!/usr/local/bin/python3
      import os
      import socket
      import stat

      socket_path = "/run/manual-check.sock"
      try:
          os.unlink(socket_path)
      except FileNotFoundError:
          pass

      server = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
      server.bind(socket_path)
      os.chmod(socket_path, 0o666)
      server.listen()

      while True:
          connection, _ = server.accept()
          with connection:
              request = b""
              while block := connection.recv(4096):
                  request += block
              arguments = request.decode().split("\0") if request else []
              try:
                  if arguments:
                      raise ValueError("用法：/challenge/check\n")
                  target = "/home/hacker/manual-proof.txt"
                  if not os.path.isfile(target):
                      raise ValueError(f"{target} 不存在。\n")
                  if stat.S_IMODE(os.stat(target).st_mode) != 0o600:
                      raise ValueError("文件权限必须为 0600。\n")
                  with open(target) as proof_file:
                      if proof_file.read().strip() != "persistent-workspace-ok":
                          raise ValueError("文件内容不正确。\n")
                  with open("/flag") as flag_file:
                      message = flag_file.read().strip() + "\n"
                  status = b"\0"
              except (OSError, UnicodeError, ValueError) as error:
                  status = b"\1"
                  message = str(error)
              connection.sendall(status + message.encode())
  - type: text
    path: manual/web-service/.init
    content: |
      #!/bin/bash
      python3 /challenge/server.py >/tmp/manual-web-service.log 2>&1 &
  - type: text
    path: manual/web-service/server.py
    content: |
      #!/usr/bin/python3
      import html
      import json
      import urllib.parse
      from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer


      class Handler(BaseHTTPRequestHandler):
          def send(self, status, content_type, body):
              encoded = body.encode()
              self.send_response(status)
              self.send_header("Content-Type", content_type)
              self.send_header("Content-Length", str(len(encoded)))
              self.send_header("Cache-Control", "no-store")
              self.end_headers()
              self.wfile.write(encoded)

          def do_GET(self):
              request = urllib.parse.urlsplit(self.path)
              if request.path == "/":
                  self.send(
                      200,
                      "text/html; charset=utf-8",
                      "<h1>Manual Web Check</h1>"
                      "<p>服务已启动。下一步请访问 <code>/status</code>。</p>",
                  )
                  return
              if request.path == "/status":
                  self.send(
                      200,
                      "application/json",
                      json.dumps(
                          {
                              "service": "manual-web",
                              "state": "ready",
                              "next": "/verify?token=browser-path-ok",
                          }
                      ),
                  )
                  return
              query = urllib.parse.parse_qs(request.query)
              if request.path == "/verify" and query.get("token") == ["browser-path-ok"]:
                  with open("/flag") as flag_file:
                      flag = html.escape(flag_file.read().strip())
                  self.send(
                      200,
                      "text/html; charset=utf-8",
                      f"<h1>Web path verified</h1><p><code>{flag}</code></p>",
                  )
                  return
              self.send(404, "text/plain; charset=utf-8", "not found\n")

          def log_message(self, format, *args):
              return


      ThreadingHTTPServer(("0.0.0.0", 80), Handler).serve_forever()
