server {
    include /etc/nginx/conf.d/dojo-host.conf;
    listen 80 default_server;

    location = /lan-health {
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "pwn.college LAN endpoint ready\n";
    }

    location = /local-tls.crt {
        alias /usr/share/nginx/html/pwncollege-local-ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Cache-Control "no-store" always;
        add_header Content-Disposition 'attachment; filename="pwncollege-local-ca.crt"';
    }

    location = /workspace-trust {
        return 307 https://workspace.$host/trust-check;
    }

    location / {
        return 307 https://$host$request_uri;
    }
}
