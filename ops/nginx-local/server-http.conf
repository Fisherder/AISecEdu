server {
    include /etc/nginx/conf.d/dojo-host.conf;
    listen 80 default_server;

    location = /lan-health {
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "AISecEdu LAN endpoint ready\n";
    }

    location = /local-tls.crt {
        alias /usr/share/nginx/html/pwncollege-local-ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Cache-Control "no-store" always;
        add_header Content-Disposition 'attachment; filename="pwncollege-local-ca.crt"';
    }

    location = /workspace-trust {
        return 307 https://workspace.$host/trust-check;
    }

    location /pwncollege_api/ {
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://ctfd_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header PWN-Trace-ID $request_id;
        proxy_set_header Proxy "";
    }

    location / {
        return 307 https://$host$request_uri;
    }
}
