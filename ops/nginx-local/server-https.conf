server {
    include /etc/nginx/conf.d/dojo-host.conf;
    listen 443 ssl default_server;
    http2 on;

    ssl_certificate /etc/nginx/local-tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/local-tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /local-tls.crt {
        alias /usr/share/nginx/html/pwncollege-local-ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Cache-Control "no-store" always;
        add_header Content-Disposition 'attachment; filename="pwncollege-local-ca.crt"';
    }

    location = /workspace-trust {
        return 307 https://workspace.$host/trust-check;
    }

    include /etc/nginx/conf.d/proxy-headers.conf;
    include /etc/nginx/conf.d/location-*.conf;
}
