server {
    include /etc/nginx/conf.d/workspace.conf;
    listen 443 ssl;
    http2 on;

    ssl_certificate /etc/nginx/local-tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/local-tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /trust-check {
        default_type text/plain;
        add_header Cache-Control "no-store" always;
        return 200 "pwn.college Workspace TLS is trusted and reachable\n";
    }
}
