{% extends "base.html" %} {% block stylesheets %} {{ super() }}
<style>
    html,
    body {
        margin: 0;
        height: 100%;
        min-height: 100%;
    }
    body {
        display: flex;
        flex-direction: column;
    }
    nav,
    footer {
        flex: none;
    }
    main {
        flex: auto;
        margin-bottom: 0px;
    }
    iframe {
        height: 100%;
        width: 100%;
        overflow: hidden;
        border: none;
    }
    .inactive {
        height: 50%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
    }
</style>
{% endblock %} {% block content %}

<iframe
    id="workspace_iframe"
    name="{{ iframe_name }}"
    src=""
    class="d-none"
    allow="clipboard-read *; clipboard-write *"
></iframe>
<h1 class="inactive">Loading...</h1>

{% endblock %} {% block scripts %} {{ super() }}

<script>
    const channel = new BroadcastChannel("Challenge-Sync-Channel");
    channel.addEventListener("message", () => window.location.reload());

    async function workspaceTlsReady(url) {
        const trustUrl = new URL("/trust-check", url.origin);
        try {
            await fetch(trustUrl, { mode: "no-cors", cache: "no-store" });
            return true;
        } catch (error) {
            const status = document.querySelector("h1");
            status.innerHTML =
                "Workspace 子域的 TLS 证书尚未受信任。" +
                `<br><a href="${trustUrl}" target="_blank">打开证书检测页并允许访问</a>` +
                "，或" +
                '<a href="/local-tls.crt">下载并信任本地 CA 证书</a>，然后刷新此页。';
            return false;
        }
    }

    let response = fetch("/pwncollege_api/v1/workspace?service={{ service }}")
        .then((response) => response.json())
        .then(async (data) => {
            if (data.active) {
                let url = new URL(data.iframe_src);
                if (data.setPort) {
                    url.port = window.location.port;
                }
                if (!(await workspaceTlsReady(url))) {
                    return;
                }
                document.getElementById("workspace_iframe").src =
                    url.toString();
                document.querySelector("h1").classList.add("d-none");
                document
                    .getElementById("workspace_iframe")
                    .classList.remove("d-none");
            } else {
                document.querySelector("h1").innerText =
                    "No active challenge session; start a challenge!";
            }
        })
        .catch((error) => {
            document.querySelector("h1").innerText =
                `Error while retrieving IFrame Url: ${error}`;
        });
</script>
{% endblock %}
